name: .NET Build & Publish

on:
  workflow_dispatch:
env:
  DOTNET_VERSION: '10.0.x'
  SOLUTION_PATH: 'src/Egov.Extensions.Logging.sln'

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

      - name: Test
        run: dotnet test ${{ env.SOLUTION_PATH }} --configuration Release --no-build --verbosity normal

  publish:
    name: Publish NuGet
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Set Version and Update Projects (Local Only)
        id: versioning
        shell: pwsh
        run: |
          # Use run_number to create version 10.0.X
          $version = "10.0.${{ github.run_number }}"
          echo "NEW_VERSION=$version" >> $env:GITHUB_OUTPUT
          
          $projects = Get-ChildItem -Recurse -Filter *.csproj -Path src
          foreach ($projectFile in $projects) {
              [xml]$csproj = Get-Content $projectFile.FullName
              
              # Find the first PropertyGroup
              $pg = $csproj.Project.PropertyGroup | Select-Object -First 1
              
              if ($null -eq $pg) {
                  $pg = $csproj.CreateElement("PropertyGroup")
                  $csproj.Project.AppendChild($pg)
              }

              if ($null -ne $pg.Version) {
                  $pg.Version = $version
              } else {
                  $vNode = $csproj.CreateElement("Version")
                  $vNode.InnerText = $version
                  $pg.AppendChild($vNode)
              }
              
              $csproj.Save($projectFile.FullName)
              Write-Host "Updated version to $version in $($projectFile.FullName) (locally only)"
          }

      - name: Pack
        run: dotnet pack ${{ env.SOLUTION_PATH }} --configuration Release --output ./nupkg /p:Version=${{ steps.versioning.outputs.NEW_VERSION }}

      - name: Push to NuGet.org
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Push to GitHub Packages
        run: |
          dotnet nuget add source --username ${{ github.actor }} --password ${{ github.token }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          dotnet nuget push ./nupkg/*.nupkg --api-key ${{ github.token }} --source github --skip-duplicate
